<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCAT Practice Quiz - Crossover Recruitment Prep</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .option-btn {
            transition: all 0.2s ease;
        }
        .option-btn:hover:not(.selected):not(.correct):not(.incorrect) {
            transform: translateX(8px);
            background-color: #e0f2fe;
        }
        .selected {
            background-color: #3b82f6 !important;
            color: white !important;
            border-color: #3b82f6 !important;
        }
        .correct {
            background-color: #22c55e !important;
            color: white !important;
            border-color: #22c55e !important;
        }
        .incorrect {
            background-color: #ef4444 !important;
            color: white !important;
            border-color: #ef4444 !important;
        }
        .progress-bar {
            transition: width 0.3s ease;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-blue-900 to-slate-900 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-white mb-2">CCAT Practice Quiz</h1>
            <p class="text-blue-300">Crossover Recruitment Exam Preparation</p>
        </div>

        <!-- Progress Section -->
        <div class="bg-white/10 backdrop-blur-lg rounded-xl p-4 mb-6">
            <div class="flex justify-between text-white mb-2">
                <span>Question <span id="currentQ">1</span> of <span id="totalQ">50</span></span>
                <span>Score: <span id="score">0</span>/<span id="answered">0</span></span>
            </div>
            <div class="w-full bg-white/20 rounded-full h-3">
                <div id="progressBar" class="progress-bar bg-gradient-to-r from-blue-500 to-cyan-400 h-3 rounded-full" style="width: 0%"></div>
            </div>
        </div>

        <!-- Question Card -->
        <div class="bg-white/95 backdrop-blur-lg rounded-2xl shadow-2xl p-8 mb-6">
            <div class="mb-2">
                <span id="categoryBadge" class="inline-block px-3 py-1 bg-blue-100 text-blue-800 rounded-full text-sm font-semibold"></span>
            </div>
            <h2 id="questionText" class="text-xl font-semibold text-gray-800 mb-6"></h2>
            
            <!-- Options -->
            <div id="optionsContainer" class="space-y-3">
                <!-- Options will be inserted here -->
            </div>

            <!-- Feedback -->
            <div id="feedback" class="mt-4 p-4 rounded-lg hidden">
                <p id="feedbackText" class="font-semibold"></p>
                <p id="explanation" class="text-sm mt-2 text-gray-600"></p>
            </div>
        </div>

        <!-- Navigation -->
        <div class="flex justify-between gap-4">
            <button id="prevBtn" onclick="prevQuestion()" class="flex-1 bg-white/20 hover:bg-white/30 text-white font-semibold py-3 px-6 rounded-xl transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                ← Previous
            </button>
            <button id="nextBtn" onclick="nextQuestion()" class="flex-1 bg-gradient-to-r from-blue-500 to-cyan-500 hover:from-blue-600 hover:to-cyan-600 text-white font-semibold py-3 px-6 rounded-xl transition-all">
                Next →
            </button>
        </div>

        <!-- Results Section (Hidden initially) -->
        <div id="resultsSection" class="hidden bg-white/95 backdrop-blur-lg rounded-2xl shadow-2xl p-8 mt-6">
            <h2 class="text-3xl font-bold text-gray-800 mb-4 text-center">Quiz Complete!</h2>
            <div class="text-center mb-6">
                <p class="text-6xl font-bold text-blue-600 mb-2"><span id="finalScore">0</span>%</p>
                <p class="text-gray-600">You answered <span id="correctCount">0</span> out of <span id="totalCount">0</span> questions correctly</p>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                <div class="bg-blue-50 rounded-xl p-4 text-center">
                    <p class="text-2xl font-bold text-blue-600" id="mathScore">0%</p>
                    <p class="text-sm text-gray-600">Math</p>
                </div>
                <div class="bg-green-50 rounded-xl p-4 text-center">
                    <p class="text-2xl font-bold text-green-600" id="verbalScore">0%</p>
                    <p class="text-sm text-gray-600">Verbal</p>
                </div>
                <div class="bg-purple-50 rounded-xl p-4 text-center">
                    <p class="text-2xl font-bold text-purple-600" id="logicScore">0%</p>
                    <p class="text-sm text-gray-600">Logic</p>
                </div>
                <div class="bg-orange-50 rounded-xl p-4 text-center">
                    <p class="text-2xl font-bold text-orange-600" id="spatialScore">0%</p>
                    <p class="text-sm text-gray-600">Spatial</p>
                </div>
            </div>
            <button onclick="restartQuiz()" class="w-full bg-gradient-to-r from-blue-500 to-cyan-500 hover:from-blue-600 hover:to-cyan-600 text-white font-semibold py-3 px-6 rounded-xl transition-all">
                Restart Quiz
            </button>
        </div>

        <!-- Timer -->
        <div class="fixed bottom-4 right-4 bg-white/20 backdrop-blur-lg rounded-xl p-3 text-white">
            <p class="text-sm">Time: <span id="timer">00:00</span></p>
        </div>
    </div>

    <script src="questions.js"></script>
    <script src="app.js"></script>
</body>
</html>
